directories:
  output: "processed"

files:
  dataset: "dataset.jsonl"
  samples: "samples.jsonl"
  summary: "summary.json"

preprocessing:
  min_context_window: 4  # HARDCODED TO BE 4 or more
  max_context_window: 30
  max_msg_words: 100
  max_time_delta_seconds: 3600
  short_response_word_count: 3
  short_response_downsample_rate: 0.10
  drop_attachment_only_responses: true
  min_words_for_language_detect: 3  # CHANGED: Allows short/medium messages to be sorted into correct language buckets
  # Options: 
  # A: Disable language detection entirely
  # B: Track in summary.json only (default)
  # C: Track in summary and use for language hints
  language_detection_mode: "B"
  
  known_bots:
    - "clyde"
    - "freestuff"
    - "system"

  ignore_users:
    - "deleted user"

  placeholders:
    - "[Attachment]"
    - "[Link]"
    - "[Empty/Reaction]"

  lang_map:
    en: "English"
    cs: "Czech"
    de: "German"

sampling:
  target_total_samples: 10000
  response_distribution:
    short_max_words: 5
    short_target_pct: 0.40
    medium_max_words: 20
    medium_target_pct: 0.40
    long_max_words: 999
    long_target_pct: 0.20