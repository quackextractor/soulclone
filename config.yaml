directories:
  output: "processed"

files:
  dataset: "dataset.jsonl"
  samples: "samples.jsonl"
  summary: "summary.json"

preprocessing:
  min_context_window: 3
  max_context_window: 5
  max_msg_words: 100
  max_time_delta_seconds: 3600
  short_response_word_count: 3
  short_response_downsample_rate: 0.80
  drop_attachment_only_responses: true
  min_words_for_language_detect: 15
  # Options: 
  # A: Disable language detection entirely
  # B: Track in summary.json only (default)
  # C: Track in summary and use for language hints
  language_detection_mode: "B"
  
  known_bots:
    - "clyde"
    - "freestuff"
    - "system"

  ignore_users:
    - "deleted user"

  placeholders:
    - "[Attachment]"
    - "[Link]"
    - "[Empty/Reaction]"

  lang_map:
    en: "English"
    cs: "Czech"
    de: "German"

sampling:
  target_total_samples: 100